name: CI

on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: ["54322:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:54322/postgres?schema=public
      # Dummy public values so Next.js build doesn't fail on missing env.
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key-placeholder
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key-placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @app/db exec prisma migrate deploy
      - run: pnpm -F @app/db generate
      - run: pnpm lint
      - run: pnpm typecheck
      # Exclude Supabase-dependent test files from CI — they require real Supabase creds.
      - run: pnpm -F @app/web exec vitest run --exclude "**/__tests__/server/actions/**" --exclude "**/__tests__/e2e/**"
      - run: pnpm build
